<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#00C896" />
  <title>DocVault</title>
  <script>
    (function(){var t=localStorage.getItem('dv_theme');if(t)document.documentElement.setAttribute('data-theme',t);})();
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap');

    :root {
      --primary:     #00C896;
      --primary-dim: rgba(0,200,150,0.12);
      --bg:          #F0F4F8;
      --surface:     #FFFFFF;
      --surface-2:   #F7F9FC;
      --text:        #0D1117;
      --text-muted:  #6B7280;
      --border:      #E2E8F0;
      --danger:      #EF4444;
      --radius:      14px;
      --shadow:      0 4px 24px rgba(0,0,0,0.07);
      --transition:  all 0.2s cubic-bezier(0.4,0,0.2,1);
    }
    [data-theme="dark"] {
      --bg:        #0D1117;
      --surface:   #161B22;
      --surface-2: #1C2333;
      --text:      #F0F6FC;
      --text-muted:#8B949E;
      --border:    #30363D;
      --shadow:    0 4px 24px rgba(0,0,0,0.4);
    }

    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; -webkit-text-size-adjust:100%; }
    body {
      font-family:'DM Sans',system-ui,sans-serif;
      font-size:16px; line-height:1.6;
      background-color:var(--bg); color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      transition:background-color 0.3s ease,color 0.3s ease;
    }
    h1,h2,h3,h4,h5,h6 { font-family:'Sora',system-ui,sans-serif; font-weight:700; line-height:1.25; color:var(--text); }
    a { color:var(--primary); text-decoration:none; }
    a:hover { text-decoration:underline; }
    img,video { max-width:100%; display:block; }
    button { font-family:'DM Sans',system-ui,sans-serif; }

    .card { background-color:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); transition:var(--transition); }
    .card:hover { transform:translateY(-3px); box-shadow:0 8px 32px rgba(0,0,0,0.13); }
    [data-theme="dark"] .card:hover { box-shadow:0 8px 32px rgba(0,0,0,0.55); }

    .btn-primary { display:inline-flex; align-items:center; justify-content:center; gap:8px; background-color:var(--primary); color:#fff; border:none; border-radius:10px; padding:10px 20px; font-size:15px; font-weight:600; cursor:pointer; transition:var(--transition); white-space:nowrap; }
    .btn-primary:hover { filter:brightness(1.1); transform:scale(1.02); }
    .btn-primary:active { transform:scale(0.98); }
    .btn-primary:disabled { opacity:0.55; cursor:not-allowed; transform:none; filter:none; }

    .btn-secondary { display:inline-flex; align-items:center; justify-content:center; gap:8px; background-color:transparent; color:var(--text); border:1.5px solid var(--border); border-radius:10px; padding:10px 20px; font-size:15px; font-weight:600; cursor:pointer; transition:var(--transition); white-space:nowrap; }
    .btn-secondary:hover { background-color:var(--surface-2); }
    .btn-secondary:active { transform:scale(0.98); }
    .btn-secondary:disabled { opacity:0.55; cursor:not-allowed; }

    .btn-danger { display:inline-flex; align-items:center; justify-content:center; gap:8px; background-color:var(--danger); color:#fff; border:none; border-radius:10px; padding:10px 20px; font-size:15px; font-weight:600; cursor:pointer; transition:var(--transition); white-space:nowrap; }
    .btn-danger:hover { filter:brightness(1.1); transform:scale(1.02); }
    .btn-danger:active { transform:scale(0.98); }
    .btn-danger:disabled { opacity:0.55; cursor:not-allowed; transform:none; filter:none; }

    .input { display:block; width:100%; background-color:var(--surface-2); border:1.5px solid var(--border); border-radius:10px; padding:10px 14px; font-family:'DM Sans',system-ui,sans-serif; font-size:15px; color:var(--text); transition:var(--transition); outline:none; appearance:none; -webkit-appearance:none; }
    .input::placeholder { color:var(--text-muted); }
    .input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(0,200,150,0.35); }
    .input:disabled { opacity:0.6; cursor:not-allowed; }

    .badge { display:inline-flex; align-items:center; background-color:var(--primary-dim); color:var(--primary); font-size:12px; font-weight:600; border-radius:20px; padding:3px 10px; white-space:nowrap; line-height:1.4; }

    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .animate-spin { animation:spin 1s linear infinite; display:inline-block; }

    @keyframes shimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
    .skeleton { background:linear-gradient(90deg,var(--surface-2) 25%,var(--border) 50%,var(--surface-2) 75%); background-size:800px 100%; animation:shimmer 1.5s infinite linear; border-radius:var(--radius); }

    @keyframes pulse-anim { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.7;transform:scale(1.08)} }
    @keyframes shake-anim { 0%{transform:translateX(0)} 15%{transform:translateX(-8px)} 30%{transform:translateX(8px)} 45%{transform:translateX(-8px)} 60%{transform:translateX(8px)} 75%{transform:translateX(-4px)} 90%{transform:translateX(4px)} 100%{transform:translateX(0)} }
    .ls-pulse { animation:pulse-anim 2.4s ease-in-out infinite; }
    .ls-shake { animation:shake-anim 0.4s ease-in-out; }

    .modal-overlay { position:fixed; inset:0; background-color:rgba(0,0,0,0.5); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); z-index:1000; display:flex; align-items:center; justify-content:center; padding:16px; }
    .modal-box { background-color:var(--surface); border-radius:18px; padding:28px; max-width:540px; width:90%; max-height:90vh; overflow-y:auto; box-shadow:0 24px 64px rgba(0,0,0,0.2); position:relative; }
    [data-theme="dark"] .modal-box { box-shadow:0 24px 64px rgba(0,0,0,0.6); }

    .avatar { display:inline-flex; align-items:center; justify-content:center; width:44px; height:44px; border-radius:50%; font-family:'Sora',system-ui,sans-serif; font-weight:700; font-size:16px; color:#fff; flex-shrink:0; user-select:none; }
    .divider { border:none; border-top:1px solid var(--border); margin:16px 0; }

    .desktop-only { display:block; }
    .mobile-only   { display:none !important; }
    .app-main      { padding-top:60px; min-height:100vh; }
    .mobile-search-bar { display:none; }

    @media (max-width:768px) {
      body { font-size:15px; }
      .card { border-radius:10px; }
      .modal-box { padding:20px; border-radius:14px; width:95%; }
      .btn-primary,.btn-secondary,.btn-danger { padding:9px 16px; font-size:14px; }
      .input { padding:9px 12px; font-size:14px; }
      .desktop-only { display:none !important; }
      .mobile-only  { display:flex !important; }
      .app-main     { padding-top:0; padding-bottom:72px; }
      .mobile-search-bar { display:block; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="modal-root"></div>

  <!-- UMD dependencies (available as globals before module script runs) -->
  <script src="https://unpkg.com/localforage@1.10.0/dist/localforage.min.js"></script>
  <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>

  <script type="module">
  'use strict';

  // ─────────────────────────────────────────────────────────────────────────────
  // CONSTANTS
  // ─────────────────────────────────────────────────────────────────────────────
  const HARDCODED_PASSWORD = 'vault2025';
  const FOLDERS = ['Identity','Education','Medical','Financial','Photos','Others'];
  const RELATIONSHIPS = ['Self','Spouse','Father','Mother','Child','Sibling','Other'];
  const RELATIONSHIP_COLORS = {
    Self:'hsl(168,70%,42%)', Spouse:'hsl(330,70%,55%)', Father:'hsl(220,70%,55%)',
    Mother:'hsl(345,65%,58%)', Child:'hsl(45,85%,50%)', Sibling:'hsl(260,60%,60%)',
    Other:'hsl(200,60%,50%)',
  };
  const MAX_FILE_SIZE = 50 * 1024 * 1024;

  // ─────────────────────────────────────────────────────────────────────────────
  // i18n
  // ─────────────────────────────────────────────────────────────────────────────
  const translations = {
    en: {
      search_placeholder:'Search documents…', upload_doc:'Upload Document',
      save_vault:'Save Vault', add_person:'Add Person',
      no_docs:'No documents found.', no_people:'No people added yet.',
      dark_mode:'Dark Mode', light_mode:'Light Mode',
      extract_text:'Extract Text', extracting:'Extracting…',
      remark:'Remark', download:'Download', delete:'Delete',
      cancel:'Cancel', save:'Save', close:'Close',
    },
    hi: {
      search_placeholder:'दस्तावेज़ खोजें…', upload_doc:'दस्तावेज़ अपलोड करें',
      save_vault:'वॉल्ट सहेजें', add_person:'व्यक्ति जोड़ें',
      no_docs:'कोई दस्तावेज़ नहीं मिला।', no_people:'अभी तक कोई व्यक्ति नहीं जोड़ा गया।',
      dark_mode:'डार्क मोड', light_mode:'लाइट मोड',
      extract_text:'टेक्स्ट निकालें', extracting:'निकाल रहे हैं…',
      remark:'टिप्पणी', download:'डाउनलोड', delete:'हटाएं',
      cancel:'रद्द करें', save:'सहेजें', close:'बंद करें',
    },
  };
  function t(key, lang = 'en') {
    return translations[lang]?.[key] ?? translations.en[key] ?? key;
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // STORAGE  (localforage is a UMD global)
  // ─────────────────────────────────────────────────────────────────────────────
  const metaStore   = localforage.createInstance({ name:'docvault', storeName:'metadata' });
  const fileStore   = localforage.createInstance({ name:'docvault', storeName:'files' });
  const peopleStore = localforage.createInstance({ name:'docvault', storeName:'people' });

  function getInitials(name) {
    const w = name.trim().split(/\s+/);
    return w.length === 1 ? w[0].slice(0,2).toUpperCase() : (w[0][0]+w[w.length-1][0]).toUpperCase();
  }
  function sanitizeSeg(s) { return s.replace(/[/\\?%*:|"<>]/g,'_'); }

  async function allValues(store) {
    const r = []; await store.iterate(v => { r.push(v); }); return r;
  }

  async function addPerson(name, relationship, profile = {}) {
    const id = crypto.randomUUID();
    const p = { id, name:name.trim(), relationship, initials:getInitials(name),
      profile:{ phone:profile.phone??'', dob:profile.dob??'', bloodGroup:profile.bloodGroup??'', address:profile.address??'' },
      createdAt:new Date().toISOString() };
    await peopleStore.setItem(id, p); return p;
  }
  async function getPeople() {
    const arr = await allValues(peopleStore);
    return arr.sort((a,b) => a.name.localeCompare(b.name));
  }
  async function deletePerson(id) {
    const docs = await getDocsByPerson(id);
    await Promise.all(docs.map(d => deleteDoc(d.id)));
    await peopleStore.removeItem(id);
  }
  async function saveDocument(blob, name, folderName, personId, remark='') {
    const id = crypto.randomUUID();
    const meta = { id, name, fileName:name, fileType:blob.type, fileSize:blob.size,
      uploadDate:new Date().toISOString(), personId, folderName, remark };
    await metaStore.setItem(id, meta); await fileStore.setItem(id, blob); return meta;
  }
  async function getDocsByPerson(personId) {
    const all = await allValues(metaStore); return all.filter(d => d.personId === personId);
  }
  async function getAllDocs() { return allValues(metaStore); }
  async function getDocFile(docId) { return fileStore.getItem(docId); }
  async function deleteDoc(docId) {
    await Promise.all([metaStore.removeItem(docId), fileStore.removeItem(docId)]);
  }
  async function renameDoc(docId, newName) {
    const ex = await metaStore.getItem(docId);
    if (!ex) throw new Error('Not found');
    const u = {...ex, name:newName, fileName:newName};
    await metaStore.setItem(docId, u); return u;
  }
  async function updateRemark(docId, remark) {
    const ex = await metaStore.getItem(docId);
    if (!ex) throw new Error('Not found');
    const u = {...ex, remark};
    await metaStore.setItem(docId, u); return u;
  }
  async function checkDuplicate(personId, fileName, fileSize) {
    const docs = await getDocsByPerson(personId);
    return docs.some(d => d.fileName === fileName || d.fileSize === fileSize);
  }
  async function exportVaultAsZip() {
    const zip = new JSZip();
    const people = await getPeople(); let count = 0;
    await Promise.all(people.map(async person => {
      const docs = await getDocsByPerson(person.id);
      await Promise.all(docs.map(async doc => {
        const blob = await getDocFile(doc.id); if (!blob) return;
        zip.file(`${sanitizeSeg(person.name)}/${sanitizeSeg(doc.folderName)}/${sanitizeSeg(doc.fileName)}`, blob);
        count++;
      }));
    }));
    const zipBlob = await zip.generateAsync({ type:'blob' });
    dlFile(zipBlob, 'DocVault_Backup.zip');
    return { success:true, count };
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // CONVERTERS  (PDF.js lazy-loaded from CDN)
  // ─────────────────────────────────────────────────────────────────────────────
  let _pdfjs = null;
  async function getPdfjs() {
    if (!_pdfjs) {
      _pdfjs = await import('https://unpkg.com/pdfjs-dist@4.2.67/build/pdf.min.mjs');
      _pdfjs.GlobalWorkerOptions.workerSrc =
        'https://unpkg.com/pdfjs-dist@4.2.67/build/pdf.worker.min.mjs';
    }
    return _pdfjs;
  }
  async function pdfToImages(pdfBlob, scale = 1.5) {
    const lib = await getPdfjs();
    const pdf = await lib.getDocument({ data: await pdfBlob.arrayBuffer() }).promise;
    const blobs = [];
    try {
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const vp = page.getViewport({ scale });
        const canvas = document.createElement('canvas');
        canvas.width = vp.width; canvas.height = vp.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
        blobs.push(await new Promise((res, rej) =>
          canvas.toBlob(b => b ? res(b) : rej(new Error('toBlob failed')), 'image/png')));
      }
    } finally { await pdf.destroy(); }
    return blobs;
  }
  async function resizeImageForExport(blob, format, preset) {
    const PRESETS = { passport:{width:413,height:531}, stamp:{width:150,height:150}, a4:{width:2480,height:3508} };
    const bm = await createImageBitmap(blob);
    let w = bm.width, h = bm.height;
    if (preset !== 'original' && PRESETS[preset]) { w = PRESETS[preset].width; h = PRESETS[preset].height; }
    const c = document.createElement('canvas'); c.width = w; c.height = h;
    c.getContext('2d').drawImage(bm, 0, 0, w, h); bm.close();
    return new Promise((res, rej) => c.toBlob(b => b ? res(b) : rej(new Error('toBlob failed')), format));
  }
  async function blobToPdfBlob(imageBlob) {
    const bm = await createImageBitmap(imageBlob);
    const { width:W, height:H } = bm;
    const c = document.createElement('canvas'); c.width = W; c.height = H;
    c.getContext('2d').drawImage(bm, 0, 0); bm.close();
    const b64 = c.toDataURL('image/jpeg', 0.92).split(',')[1];
    const bs = atob(b64); const imgBytes = new Uint8Array(bs.length);
    for (let i = 0; i < bs.length; i++) imgBytes[i] = bs.charCodeAt(i);
    const enc = new TextEncoder(); const imgLen = imgBytes.length;
    const o1 = '1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n';
    const o2 = '2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n';
    const o3 = `3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${W} ${H}] /Contents 4 0 R /Resources << /XObject << /Im0 5 0 R >> >> >>\nendobj\n`;
    const cs = `q ${W} 0 0 ${H} 0 0 cm /Im0 Do Q`;
    const o4 = `4 0 obj\n<< /Length ${cs.length} >>\nstream\n${cs}\nendstream\nendobj\n`;
    const o5h = `5 0 obj\n<< /Type /XObject /Subtype /Image /Width ${W} /Height ${H} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${imgLen} >>\nstream\n`;
    const o5f = '\nendstream\nendobj\n';
    const hdr = enc.encode('%PDF-1.4\n');
    const parts = [enc.encode(o1),enc.encode(o2),enc.encode(o3),enc.encode(o4),enc.encode(o5h)];
    let off = hdr.length;
    const offsets = parts.map(p => { const o = off; off += p.length; return o; });
    const xrefOff = off + imgBytes.length + enc.encode(o5f).length;
    const xref = `xref\n0 6\n0000000000 65535 f \n${offsets.map(o=>`${String(o).padStart(10,'0')} 00000 n \n`).join('')}trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n${xrefOff}\n%%EOF\n`;
    const all = [hdr,...parts,imgBytes,enc.encode(o5f),enc.encode(xref)];
    const out = new Uint8Array(all.reduce((s,p) => s+p.length, 0));
    let pos = 0; for (const p of all) { out.set(p, pos); pos += p.length; }
    return new Blob([out], { type:'application/pdf' });
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // HELPERS
  // ─────────────────────────────────────────────────────────────────────────────
  function dlFile(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  }
  function fmtSize(bytes) {
    if (bytes == null) return '';
    return bytes < 1048576 ? `${(bytes/1024).toFixed(1)} KB` : `${(bytes/1048576).toFixed(2)} MB`;
  }
  function fmtDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString(undefined,{year:'numeric',month:'short',day:'numeric'});
  }
  function esc(s) {
    return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // ICONS  (Lucide SVG paths)
  // ─────────────────────────────────────────────────────────────────────────────
  const IP = {
    shield:       '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
    moon:         '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>',
    sun:          '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>',
    archive:      '<polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/>',
    house:        '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
    search:       '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
    plus:         '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
    fileText:     '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>',
    users:        '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
    arrowLeft:    '<line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>',
    chevronDown:  '<polyline points="6 9 12 15 18 9"/>',
    chevronRight: '<polyline points="9 18 15 12 9 6"/>',
    x:            '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
    uploadCloud:  '<polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>',
    camera:       '<path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>',
    download:     '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
    trash2:       '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>',
    alertTriangle:'<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
  };
  function ic(name, size=24, sw=2, color='currentColor') {
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;display:block">${IP[name]??''}</svg>`;
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // APP STATE
  // ─────────────────────────────────────────────────────────────────────────────
  const S = {
    isUnlocked: sessionStorage.getItem('dv_auth') === 'true',
    theme:      localStorage.getItem('dv_theme') ?? 'light',
    lang:       localStorage.getItem('dv_lang')  ?? 'en',
    view:       'home',   // 'home' | 'person' | 'search'
    person:     null,
    people:     [],
    loadingPeople: false,
    exporting:  false,
    searchQuery: '',
    searchResults: [],
    docCounts:  {},
  };

  // Per-view state
  let pvDocs         = [];   // PersonVaultView documents
  let pvLoading      = true;
  let pvOpenFolders  = new Set();

  // Modal state objects (null = closed)
  let uploadSt = null;
  let viewerSt = null;

  // Per-render flags
  let showAddPerson  = false;
  let addPersonForm  = { name:'', relationship:'Self', phone:'', dob:'', bloodGroup:'', address:'' };
  let searchTimer    = null;

  // ─────────────────────────────────────────────────────────────────────────────
  // RENDER — helpers
  // ─────────────────────────────────────────────────────────────────────────────
  function setTheme(th) {
    S.theme = th;
    localStorage.setItem('dv_theme', th);
    document.documentElement.setAttribute('data-theme', th);
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // RENDER — Login
  // ─────────────────────────────────────────────────────────────────────────────
  function renderLogin() {
    return `
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;
                  background:radial-gradient(ellipse at 50% 40%,#1a2a3a 0%,#0D1117 70%);padding:24px;">
        <div style="display:flex;flex-direction:column;align-items:center;gap:24px;width:100%;max-width:400px;">
          <div class="ls-pulse" style="color:#00C896;display:flex;">${ic('shield',72,1.5,'#00C896')}</div>
          <h1 style="font-family:'Sora',system-ui,sans-serif;font-size:2.6rem;font-weight:700;
                     color:#F0F6FC;letter-spacing:-0.5px;text-align:center;">DocVault</h1>
          <p style="font-size:1rem;color:#8B949E;text-align:center;margin-top:-12px;">
            Your documents. Private. Always.</p>
          <form id="login-form" style="width:100%;display:flex;flex-direction:column;gap:12px;">
            <div id="login-wrap" style="display:flex;flex-direction:column;gap:8px;">
              <input id="login-pw" type="password" class="input"
                placeholder="Enter password" autocomplete="current-password" autofocus
                style="background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.12);
                       color:#F0F6FC;font-size:15px;padding:12px 16px;" />
              <p id="login-err" style="color:#EF4444;font-size:13px;display:none;"></p>
            </div>
            <button type="submit" class="btn-primary"
                    style="width:100%;padding:12px;font-size:16px;">Unlock</button>
          </form>
        </div>
      </div>`;
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // RENDER — Navbar (desktop)
  // ─────────────────────────────────────────────────────────────────────────────
  function renderNavbar() {
    const { lang, theme, exporting, searchQuery } = S;
    return `
      <nav class="desktop-only"
           style="position:fixed;top:0;left:0;right:0;height:60px;background:var(--surface);
                  border-bottom:1px solid var(--border);display:flex;align-items:center;
                  padding:0 24px;gap:16px;z-index:200;box-shadow:var(--shadow);">
        <button id="btn-home"
                style="display:flex;align-items:center;gap:8px;flex-shrink:0;background:none;
                       border:none;cursor:pointer;padding:0;" title="Go home">
          ${ic('shield',22,2,'var(--primary)')}
          <span style="font-family:'Sora',system-ui,sans-serif;font-weight:700;font-size:1.1rem;
                       color:var(--text);">DocVault</span>
        </button>
        <div style="flex:1;max-width:520px;margin:0 auto;">
          <div style="position:relative;">
            <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);
                         color:var(--text-muted);pointer-events:none;">${ic('search',15)}</span>
            <input id="search-input" class="input"
                   value="${esc(searchQuery)}"
                   placeholder="${esc(t('search_placeholder',lang))}"
                   style="padding-left:36px;height:38px;font-size:14px;" />
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
          <button id="btn-lang" class="btn-secondary"
                  style="padding:7px 14px;font-size:13px;font-weight:700;"
                  title="Toggle language">${lang==='en'?'हि':'EN'}</button>
          <button id="btn-theme" class="btn-secondary" style="padding:8px 12px;"
                  title="${theme==='light'?t('dark_mode',lang):t('light_mode',lang)}">
            ${theme==='light'?ic('moon',16):ic('sun',16)}
          </button>
          <button id="btn-export" class="btn-secondary"
                  style="padding:8px 14px;font-size:13px;display:inline-flex;align-items:center;gap:6px;"
                  ${exporting?'disabled':''}>
            ${ic('archive',15)} ${exporting?'Exporting…':t('save_vault',lang)}
          </button>
        </div>
      </nav>`;
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // RENDER — Mobile bottom nav
  // ─────────────────────────────────────────────────────────────────────────────
  function renderMobileNav() {
    const { view, exporting, lang } = S;
    function tab(iconName, label, v, id) {
      const active = view === v;
      return `<button id="${id}"
                style="display:flex;flex-direction:column;align-items:center;justify-content:center;
                       border:none;background:none;cursor:pointer;flex:1;padding:8px 0;gap:3px;
                       color:${active?'var(--primary)':'var(--text-muted)'};">
          ${ic(iconName,22)}
          <span style="font-size:10px;font-weight:600;max-width:60px;overflow:hidden;
                       text-overflow:ellipsis;white-space:nowrap;">${esc(label)}</span>
        </button>`;
    }
    return `
      <nav class="mobile-only"
           style="position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--surface);
                  border-top:1px solid var(--border);z-index:200;
                  box-shadow:0 -2px 16px rgba(0,0,0,0.07);
                  align-items:center;justify-content:space-around;">
        ${tab('house','Home','home','mob-home')}
        ${tab('search',t('search_placeholder',lang).replace('…',''),'search','mob-search')}
        <button id="mob-upload"
                style="display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
                       border:none;background:none;cursor:pointer;flex:1;padding-bottom:6px;">
          <div style="width:46px;height:46px;border-radius:50%;background:var(--primary);
                      display:flex;align-items:center;justify-content:center;
                      box-shadow:0 4px 16px rgba(0,200,150,0.4);">
            ${ic('plus',22,2,'#fff')}
          </div>
        </button>
        <button id="mob-save"
                style="display:flex;flex-direction:column;align-items:center;justify-content:center;
                       border:none;background:none;cursor:${exporting?'not-allowed':'pointer'};flex:1;
                       padding:8px 0;gap:3px;color:var(--text-muted);opacity:${exporting?0.5:1};"
                ${exporting?'disabled':''}>
          ${ic('archive',22)}
          <span style="font-size:10px;font-weight:600;">${exporting?'Exporting…':t('save_vault',lang)}</span>
        </button>
      </nav>`;
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // RENDER — Dashboard
  // ─────────────────────────────────────────────────────────────────────────────
  function statCard(label, value, iconName) {
    return `
      <div class="card"
           style="padding:20px 28px;display:flex;align-items:center;gap:16px;min-width:180px;">
        <div style="width:44px;height:44px;border-radius:12px;background:var(--primary-dim);
                    color:var(--primary);display:flex;align-items:center;justify-content:center;">
          ${ic(iconName,20,2,'var(--primary)')}
        </div>
        <div>
          <p data-count="${value}"
             style="font-family:'Sora',system-ui,sans-serif;font-weight:700;font-size:1.8rem;
                    color:var(--text);line-height:1;">0</p>
          <p style="font-size:13px;color:var(--text-muted);margin-top:4px;">${esc(label)}</p>
        </div>
      </div>`;
  }

  function personCard(person, docCount) {
    const col = RELATIONSHIP_COLORS[person.relationship] ?? RELATIONSHIP_COLORS.Other;
    return `
      <div class="card person-card" data-pid="${esc(person.id)}"
           style="cursor:pointer;padding:20px;position:relative;outline:2px solid transparent;
                  outline-offset:2px;display:flex;flex-direction:column;align-items:center;
                  gap:10px;text-align:center;user-select:none;">
        <button class="del-person" data-pid="${esc(person.id)}" title="Remove person"
                style="position:absolute;top:10px;right:10px;display:flex;align-items:center;
                       justify-content:center;width:24px;height:24px;border-radius:50%;
                       border:none;background:var(--danger);color:#fff;cursor:pointer;padding:0;
                       opacity:0;pointer-events:none;transition:opacity 0.2s ease;">
          ${ic('x',13,2.5)}
        </button>
        <div class="avatar" style="width:56px;height:56px;font-size:18px;background-color:${col};">
          ${esc(person.initials)}</div>
        <p style="font-family:'Sora',system-ui,sans-serif;font-weight:700;font-size:15px;
                  color:var(--text);line-height:1.3;">${esc(person.name)}</p>
        <span class="badge">${esc(person.relationship)}</span>
        <p style="font-size:12px;color:var(--text-muted);">
          ${docCount} ${docCount===1?'document':'documents'}</p>
      </div>`;
  }

  function renderAddPersonModal() {
    const f = addPersonForm;
    return `
      <div class="modal-overlay" id="ap-overlay">
        <div class="modal-box" id="ap-box">
          <h3 style="font-family:'Sora',system-ui,sans-serif;font-weight:700;font-size:1.15rem;
                     margin-bottom:20px;color:var(--text);">Add Person</h3>
          <form id="ap-form" style="display:flex;flex-direction:column;gap:14px;">
            ${['name','phone','bloodGroup'].map(field => `
              <div>
                <label style="display:block;font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:6px;">
                  ${field==='name'?'Name *':field==='phone'?'Phone':'Blood Group'}
                </label>
                <input class="input" name="${field}" value="${esc(f[field])}"
                  placeholder="${field==='name'?'Full name':field==='phone'?'Phone number':'e.g. A+'}"
                  ${field==='name'?'required autofocus':''} ${field==='phone'?'type="tel"':''} />
              </div>`).join('')}
            <div>
              <label style="display:block;font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:6px;">Relationship</label>
              <select class="input" name="relationship">
                ${RELATIONSHIPS.map(r=>`<option${r===f.relationship?' selected':''}>${r}</option>`).join('')}
              </select>
            </div>
            <div>
              <label style="display:block;font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:6px;">Date of Birth</label>
              <input class="input" name="dob" type="date" value="${esc(f.dob)}" />
            </div>
            <div>
              <label style="display:block;font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:6px;">Address</label>
              <textarea class="input" name="address" rows="3"
                        style="resize:vertical;" placeholder="Address">${esc(f.address)}</textarea>
            </div>
            <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:4px;">
              <button type="button" class="btn-secondary" id="ap-cancel">Cancel</button>
              <button type="submit" class="btn-primary" id="ap-submit">Add Person</button>
            </div>
          </form>
        </div>
      </div>`;
  }

  function renderDashboard() {
    const { people, loadingPeople, docCounts } = S;
    const totalDocs = Object.values(docCounts).reduce((s,n)=>s+n, 0);
    let grid;
    if (loadingPeople) {
      grid = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;">
        ${[1,2,3].map(()=>`<div class="skeleton" style="height:160px;border-radius:14px;"></div>`).join('')}
      </div>`;
    } else if (people.length === 0) {
      grid = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;
                    padding:64px 24px;gap:16px;color:var(--text-muted);text-align:center;">
          <span style="opacity:0.35;">${ic('users',56,1.2)}</span>
          <p style="font-family:'Sora',system-ui,sans-serif;font-weight:600;font-size:1.1rem;">No people yet</p>
          <p style="font-size:14px;">Add a person to start organising their documents.</p>
          <button class="btn-primary" id="btn-add-person-empty">
            ${ic('plus',16)} Add your first person</button>
        </div>`;
    } else {
      grid = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;">
        ${people.map(p => personCard(p, docCounts[p.id]??0)).join('')}
      </div>`;
    }
    return `
      <div style="padding:24px;max-width:1100px;margin:0 auto;">
        <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:32px;">
          ${statCard('Total People', people.length, 'users')}
          ${statCard('Total Documents', totalDocs, 'fileText')}
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;
                    margin-bottom:20px;gap:12px;flex-wrap:wrap;">
          <h2 style="font-family:'Sora',system-ui,sans-serif;font-weight:700;
                     font-size:1.25rem;color:var(--text);">People</h2>
          <button class="btn-primary" id="btn-add-person">
            ${ic('plus',16)} Add Person</button>
        </div>
        <div id="people-grid">${grid}</div>
        ${showAddPerson ? renderAddPersonModal() : ''}
      </div>`;
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // RENDER — PersonVaultView
  // ─────────────────────────────────────────────────────────────────────────────
  function docCard(doc) {
    const isImg = doc.fileType?.startsWith('image/');
    return `
      <div class="card doc-card" data-doc-id="${esc(doc.id)}"
           style="cursor:pointer;padding:12px;display:flex;gap:12px;align-items:center;">
        <div style="width:56px;height:56px;border-radius:8px;overflow:hidden;
                    background:var(--surface-2);flex-shrink:0;display:flex;
                    align-items:center;justify-content:center;">
          ${isImg
            ? `<img id="th-${esc(doc.id)}" src="" alt="${esc(doc.name)}"
                    style="width:100%;height:100%;object-fit:cover;display:none;"/>
               <span id="th-ic-${esc(doc.id)}">${ic('fileText',24,1.5,'var(--primary)')}</span>`
            : ic('fileText',24,1.5,'var(--primary)')
          }
        </div>
        <div style="flex:1;min-width:0;">
          <p style="font-weight:600;font-size:14px;color:var(--text);white-space:nowrap;
                    overflow:hidden;text-overflow:ellipsis;">${esc(doc.name)}</p>
          <div style="display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;">
            <span style="font-size:12px;color:var(--text-muted);">${esc(fmtDate(doc.uploadDate))}</span>
            <span style="font-size:12px;color:var(--text-muted);">${esc(fmtSize(doc.fileSize))}</span>
          </div>
        </div>
      </div>`;
  }

  function renderPersonDocs() {
    const { lang } = S;
    if (pvLoading) {
      return `<div style="display:flex;flex-direction:column;gap:12px;">
        ${[1,2,3].map(()=>`<div class="skeleton" style="height:72px;border-radius:14px;"></div>`).join('')}
      </div>`;
    }
    if (pvDocs.length === 0) {
      return `
        <div style="text-align:center;padding:56px 24px;color:var(--text-muted);">
          <span style="opacity:0.35;display:block;margin:0 auto 16px;">${ic('fileText',52,1.2)}</span>
          <p style="font-family:'Sora',system-ui,sans-serif;font-weight:600;font-size:1.05rem;">
            No documents yet</p>
          <p style="font-size:14px;margin-top:6px;">Upload a document to get started.</p>
          <button class="btn-primary" id="btn-upload-empty" style="margin-top:20px;">
            ${ic('plus',16)} ${t('upload_doc',lang)}</button>
        </div>`;
    }
    const grouped = {};
    pvDocs.forEach(d => { (grouped[d.folderName] ??= []).push(d); });
    return `
      <div style="display:flex;flex-direction:column;gap:16px;">
        ${Object.entries(grouped).map(([folder, docs]) => {
          const open = pvOpenFolders.has(folder);
          return `
            <div class="card" style="overflow:hidden;padding:0;">
              <button class="folder-toggle" data-folder="${esc(folder)}"
                      style="width:100%;display:flex;align-items:center;
                             justify-content:space-between;padding:14px 16px;background:none;
                             border:none;cursor:pointer;color:var(--text);
                             border-bottom:${open?'1px solid var(--border)':'none'};">
                <div style="display:flex;align-items:center;gap:10px;">
                  <span style="font-family:'Sora',system-ui,sans-serif;font-weight:600;
                               font-size:15px;">${esc(folder)}</span>
                  <span style="font-size:11px;background:var(--primary-dim);color:var(--primary);
                               border-radius:12px;padding:2px 8px;font-weight:600;">${docs.length}</span>
                </div>
                ${open ? ic('chevronDown',18) : ic('chevronRight',18)}
              </button>
              ${open ? `
                <div style="padding:12px;display:grid;
                            grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;">
                  ${docs.map(d => docCard(d)).join('')}
                </div>` : ''}
            </div>`;
        }).join('')}
      </div>`;
  }

  function renderPersonView() {
    const { person, lang } = S;
    const col = RELATIONSHIP_COLORS[person.relationship] ?? RELATIONSHIP_COLORS.Other;
    const pr = person.profile || {};
    return `
      <div style="max-width:900px;margin:0 auto;padding:24px;">
        <button class="btn-secondary" id="btn-back"
                style="margin-bottom:20px;padding:8px 14px;font-size:14px;">
          ${ic('arrowLeft',16)} Back</button>
        <div class="card"
             style="padding:24px;margin-bottom:24px;display:flex;gap:20px;
                    align-items:flex-start;flex-wrap:wrap;">
          <div class="avatar"
               style="width:64px;height:64px;font-size:22px;background-color:${col};flex-shrink:0;">
            ${esc(person.initials)}</div>
          <div style="flex:1;min-width:180px;">
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;">
              <h2 style="font-family:'Sora',system-ui,sans-serif;font-weight:700;
                         font-size:1.35rem;color:var(--text);">${esc(person.name)}</h2>
              <span class="badge">${esc(person.relationship)}</span>
            </div>
            <div style="display:flex;gap:16px;flex-wrap:wrap;">
              ${pr.phone ? `<span style="font-size:13px;color:var(--text-muted);">📞 ${esc(pr.phone)}</span>` : ''}
              ${pr.dob   ? `<span style="font-size:13px;color:var(--text-muted);">🎂 ${esc(pr.dob)}</span>` : ''}
              ${pr.bloodGroup ? `<span style="font-size:13px;color:var(--text-muted);">🩸 ${esc(pr.bloodGroup)}</span>` : ''}
            </div>
          </div>
          <button class="btn-primary" id="btn-upload"
                  style="flex-shrink:0;align-self:flex-start;">
            ${ic('plus',16)} ${t('upload_doc',lang)}</button>
        </div>
        <div id="pv-docs">${renderPersonDocs()}</div>
      </div>`;
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // RENDER — Search
  // ─────────────────────────────────────────────────────────────────────────────
  function renderSearchResults() {
    const { searchQuery: q, searchResults: results, people, lang } = S;
    const pm = Object.fromEntries(people.map(p=>[p.id,p]));
    if (!q.trim()) return `
      <div style="padding:48px 24px;text-align:center;color:var(--text-muted);">
        <span style="opacity:0.35;display:block;margin:0 auto 16px;">${ic('search',52,1.2)}</span>
        <p style="font-family:'Sora',system-ui,sans-serif;font-weight:600;font-size:1rem;">
          Start typing to search documents</p>
      </div>`;
    if (!results.length) return `
      <div style="padding:48px 24px;text-align:center;color:var(--text-muted);">
        <span style="opacity:0.35;display:block;margin:0 auto 16px;">${ic('fileText',52,1.2)}</span>
        <p>${t('no_docs',lang)}</p>
      </div>`;
    return `
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">
        ${results.length} result${results.length!==1?'s':''} for &ldquo;${esc(q)}&rdquo;</p>
      <div style="display:flex;flex-direction:column;gap:12px;">
        ${results.map(doc => {
          const person = pm[doc.personId];
          return `
            <div class="card doc-card" data-doc-id="${esc(doc.id)}"
                 style="padding:16px 20px;cursor:pointer;display:flex;align-items:center;gap:16px;">
              ${ic('fileText',28,1.5,'var(--primary)')}
              <div style="flex:1;min-width:0;">
                <p style="font-weight:600;color:var(--text);font-size:15px;white-space:nowrap;
                          overflow:hidden;text-overflow:ellipsis;">${esc(doc.name)}</p>
                <div style="display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;align-items:center;">
                  ${person?`<span style="font-size:13px;color:var(--text-muted);">${esc(person.name)}</span>`:''}
                  <span class="badge">${esc(doc.folderName)}</span>
                </div>
              </div>
            </div>`;
        }).join('')}
      </div>`;
  }

  function renderSearchView() {
    const { searchQuery, lang } = S;
    return `
      <div style="padding:24px;max-width:1100px;margin:0 auto;">
        <div class="mobile-search-bar" style="margin-bottom:20px;">
          <div style="position:relative;">
            <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);
                         color:var(--text-muted);pointer-events:none;">${ic('search',15)}</span>
            <input id="mobile-search" class="input" value="${esc(searchQuery)}"
                   placeholder="${esc(t('search_placeholder',lang))}"
                   style="padding-left:36px;" autofocus />
          </div>
        </div>
        <div id="search-results">${renderSearchResults()}</div>
      </div>`;
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // RENDER — Upload Modal
  // ─────────────────────────────────────────────────────────────────────────────
  function renderUploadModal() {
    if (!uploadSt) { document.getElementById('modal-root').innerHTML = ''; return; }
    const s = uploadSt; const { lang } = S;
    document.getElementById('modal-root').innerHTML = `
      <div class="modal-overlay" id="up-overlay">
        <div class="modal-box" id="up-box">

  // ─────────────────────────────────────────────────────────────────────────────
  // RENDER — Download Modal (nested inside viewer)
  // ─────────────────────────────────────────────────────────────────────────────
  function renderDownloadModal() {
    const ds = viewerSt.downloadSt;
    const FORMATS = ['JPG','PNG','PDF'];
    const PRESETS  = [
      {label:'Original',value:'original'},
      {label:'Passport (413×531)',value:'passport'},
      {label:'Stamp (150×150)',value:'stamp'},
      {label:'A4 (2480×3508)',value:'a4'},
    ];
    function pill(label, active, id) {
      return `<button type="button" id="${id}"
        style="padding:7px 16px;font-size:13px;font-weight:600;border-radius:20px;
               border:1.5px solid ${active?'var(--primary)':'var(--border)'};
               background:${active?'var(--primary)':'var(--surface-2)'};
               color:${active?'#fff':'var(--text-muted)'};cursor:pointer;
               transition:all 0.15s ease;">${esc(label)}</button>`;
    }
    return `
      <div style="position:absolute;inset:0;background:rgba(0,0,0,0.45);
                  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
                  display:flex;align-items:center;justify-content:center;
                  z-index:10;border-radius:18px;" id="dl-overlay">
        <div class="modal-box" style="max-width:420px;width:90%;" id="dl-box">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">

                       font-size:1.1rem;color:var(--text);">Download</h3>

                                          color:var(--text-muted);padding:4px;">${ic('x',20)}</button>
          </div>
          ${ds.previewUrl ? `
            <div style="width:100%;height:120px;border-radius:10px;overflow:hidden;
                        background:var(--surface-2);margin-bottom:20px;display:flex;
                        align-items:center;justify-content:center;">
              <img src="${esc(ds.previewUrl)}" alt="Preview"
                   style="max-width:100%;max-height:100%;object-fit:contain;" />
            </div>` : ''}
          <div style="margin-bottom:16px;">
            <p style="font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:8px;">Format</p>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
              ${FORMATS.map(f => pill(f, ds.format===f, `dl-fmt-${f}`)).join('')}
            </div>

            <div style="margin-bottom:20px;">
              <p style="font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:8px;">Size</p>
              <div style="display:flex;gap:8px;flex-wrap:wrap;">

      </div>`;

  // ─────────────────────────────────────────────────────────────────────────────
  // MAIN RENDER
  // ─────────────────────────────────────────────────────────────────────────────
  function render() {
    const root = document.getElementById('root');
    if (!S.isUnlocked) {
      root.innerHTML = renderLogin();
      attachLoginEvents();
      return;
    }
    let content;
    switch (S.view) {
      case 'home':   content = renderDashboard();  break;
      case 'person': content = renderPersonView(); break;
      case 'search': content = renderSearchView(); break;
      default:       content = renderDashboard();
    }
    root.innerHTML =
      renderNavbar() +
      `<main class="app-main">${content}</main>` +
      renderMobileNav();
    attachAppEvents();

    // Animate stat counters
    root.querySelectorAll('[data-count]').forEach(el => countUp(el, +el.dataset.count));

    // Lazy-load thumbnails in person view
    if (S.view === 'person') lazyThumbs(pvDocs);
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // COUNT-UP
  // ─────────────────────────────────────────────────────────────────────────────
  function countUp(el, target, dur = 900) {
    let start = null;
    const step = ts => {
      if (!start) start = ts;
      const p = Math.min((ts - start) / dur, 1);
      el.textContent = Math.round(p * target);
      if (p < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // LAZY THUMBNAILS
  // ─────────────────────────────────────────────────────────────────────────────
  function lazyThumbs(docs) {
    docs.filter(d => d.fileType?.startsWith('image/')).forEach(d => {
      getDocFile(d.id).then(blob => {
        if (!blob) return;
        const url = URL.createObjectURL(blob);
        const img  = document.getElementById(`th-${d.id}`);
        const icon = document.getElementById(`th-ic-${d.id}`);
        if (img) {
          img.src = url;
          img.onload = () => { img.style.display='block'; if(icon) icon.style.display='none'; };
          img.onerror = () => URL.revokeObjectURL(url);
        }
      }).catch(()=>{});
    });
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // EVENT BINDING — Login
  // ─────────────────────────────────────────────────────────────────────────────
  function attachLoginEvents() {
    const form = document.getElementById('login-form');
    if (!form) return;
    form.addEventListener('submit', e => {
      e.preventDefault();
      const pw = document.getElementById('login-pw').value;
      if (pw === HARDCODED_PASSWORD) {
        sessionStorage.setItem('dv_auth','true');
        S.isUnlocked = true;
        S.loadingPeople = true;
        render();
        loadPeople();
      } else {
        const wrap = document.getElementById('login-wrap');
        const err  = document.getElementById('login-err');
        err.textContent = 'Incorrect password';
        err.style.display = 'block';
        wrap.classList.remove('ls-shake');
        void wrap.offsetWidth; // reflow
        wrap.classList.add('ls-shake');
        wrap.addEventListener('animationend', () => wrap.classList.remove('ls-shake'), {once:true});
        document.getElementById('login-pw').style.border = '1.5px solid #EF4444';
        document.getElementById('login-pw').focus();
      }
    });
    document.getElementById('login-pw').addEventListener('input', () => {
      document.getElementById('login-err').style.display = 'none';
      document.getElementById('login-pw').style.border = '1.5px solid rgba(255,255,255,0.12)';
    });
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // EVENT BINDING — Main App
  // ─────────────────────────────────────────────────────────────────────────────
  function attachAppEvents() {
    on('btn-home',      'click', () => gotoView('home'));
    on('btn-lang',      'click', () => { S.lang = S.lang==='en'?'hi':'en'; localStorage.setItem('dv_lang',S.lang); render(); });
    on('btn-theme',     'click', () => { setTheme(S.theme==='light'?'dark':'light'); render(); });
    on('btn-export',    'click', handleExport);
    on('mob-home',      'click', () => gotoView('home'));
    on('mob-search',    'click', () => gotoView('search'));
    on('mob-upload',    'click', handleMobUpload);
    on('mob-save',      'click', handleExport);
    on('search-input',  'input', handleSearchInput);
    on('mobile-search', 'input', handleSearchInput);

    // Dashboard
    on('btn-add-person',       'click', openAddPerson);
    on('btn-add-person-empty', 'click', openAddPerson);

    if (showAddPerson) {
      on('ap-overlay', 'click', e => { if (e.target.id==='ap-overlay') closeAddPerson(); });
      on('ap-cancel',  'click', closeAddPerson);
      on('ap-form',    'submit', handleAddPerson);
      document.querySelector('#ap-box input[name="name"]')?.focus();
    }

    // Person cards (hover for delete btn, click to open)
    document.querySelectorAll('.person-card').forEach(card => {
      card.addEventListener('mouseenter', () => {
        const btn = card.querySelector('.del-person');
        if (btn) { btn.style.opacity='1'; btn.style.pointerEvents='auto'; }
      });
      card.addEventListener('mouseleave', () => {
        const btn = card.querySelector('.del-person');
        if (btn) { btn.style.opacity='0'; btn.style.pointerEvents='none'; }
      });
      card.addEventListener('click', e => {
        if (e.target.closest('.del-person')) return;
        const pid = card.dataset.pid;
        const person = S.people.find(p=>p.id===pid);
        if (person) gotoPersonView(person);
      });
    });
    document.querySelectorAll('.del-person').forEach(btn => {
      btn.addEventListener('click', async e => {
        e.stopPropagation();
        const pid = btn.dataset.pid;
        const person = S.people.find(p=>p.id===pid);
        if (!person) return;
        if (!confirm(`Delete ${person.name}? This will remove all their documents too.`)) return;
        await deletePerson(pid);
        S.people = S.people.filter(p=>p.id!==pid);
        delete S.docCounts[pid];
        render();
      });
    });

    // Person view
    on('btn-back',         'click', () => gotoView('home'));
    on('btn-upload',       'click', () => openUpload(S.person));
    on('btn-upload-empty', 'click', () => openUpload(S.person));
    document.querySelectorAll('.folder-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const f = btn.dataset.folder;
        pvOpenFolders.has(f) ? pvOpenFolders.delete(f) : pvOpenFolders.add(f);
        const pvDocs_ = pvDocs; // capture
        document.getElementById('pv-docs').innerHTML = renderPersonDocs();
        attachDocCardEvents();
        lazyThumbs(pvDocs_);
      });
    });
    attachDocCardEvents();
  }

  function attachDocCardEvents() {
    document.querySelectorAll('.doc-card').forEach(card => {
      card.addEventListener('click', () => {
        const docId = card.dataset.docId;
        // Find doc in pvDocs or searchResults
        let doc = pvDocs.find(d=>d.id===docId) || S.searchResults.find(d=>d.id===docId);
        if (doc) openViewer(doc);
      });
    });
  }

  function on(id, ev, fn) {
    const el = document.getElementById(id);
    if (el) el.addEventListener(ev, fn);
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // NAVIGATION
  // ─────────────────────────────────────────────────────────────────────────────
  async function gotoView(view) {
    S.view = view; S.person = null;
    if (view === 'home') {
      showAddPerson = false;
      addPersonForm = { name:'', relationship:'Self', phone:'', dob:'', bloodGroup:'', address:'' };
    }
    render();
  }

  async function gotoPersonView(person) {
    S.view = 'person'; S.person = person;
    pvDocs = []; pvLoading = true; pvOpenFolders = new Set();
    render();
    try {
      pvDocs = await getDocsByPerson(person.id);
      pvOpenFolders = new Set(pvDocs.map(d=>d.folderName));
      pvLoading = false;
      const area = document.getElementById('pv-docs');
      if (area) { area.innerHTML = renderPersonDocs(); attachDocCardEvents(); lazyThumbs(pvDocs); }
    } catch(e) { console.error(e); pvLoading = false; }
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // SEARCH
  // ─────────────────────────────────────────────────────────────────────────────
  function handleSearchInput(e) {
    const q = e.target.value;
    S.searchQuery = q;
    // Keep the other input in sync
    ['search-input','mobile-search'].forEach(id => {
      const el = document.getElementById(id);
      if (el && el !== e.target) el.value = q;
    });
    if (S.view !== 'search') { S.view = 'search'; render(); }
    if (searchTimer) clearTimeout(searchTimer);
    if (!q.trim()) { S.searchResults = []; updateSearchResults(); return; }
    searchTimer = setTimeout(async () => {
      const docs = await getAllDocs();
      const ql = q.toLowerCase();
      S.searchResults = docs.filter(d => d.name.toLowerCase().includes(ql));
      updateSearchResults();
    }, 300);
  }

  function updateSearchResults() {
    const el = document.getElementById('search-results');
    if (el) { el.innerHTML = renderSearchResults(); attachDocCardEvents(); }
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // EXPORT
  // ─────────────────────────────────────────────────────────────────────────────
  async function handleExport() {
    S.exporting = true; render();
    try { await exportVaultAsZip(); }
    catch(e) { alert(`Export failed: ${e.message}`); }
    finally { S.exporting = false; render(); }
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // MOBILE UPLOAD  (navigate to person view first if needed)
  // ─────────────────────────────────────────────────────────────────────────────
  function handleMobUpload() {
    if (S.view === 'person' && S.person) openUpload(S.person);
    else gotoView('home');
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // ADD PERSON
  // ─────────────────────────────────────────────────────────────────────────────
  function openAddPerson() { showAddPerson = true; render(); }
  function closeAddPerson() { showAddPerson = false; addPersonForm = { name:'', relationship:'Self', phone:'', dob:'', bloodGroup:'', address:'' }; render(); }

  async function handleAddPerson(e) {
    e.preventDefault();
    const form = document.getElementById('ap-form');
    const fd = new FormData(form);
    const name = fd.get('name')?.trim();
    if (!name) return;
    const btn = document.getElementById('ap-submit');
    if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
    try {
      const person = await addPerson(name, fd.get('relationship'), {
        phone: fd.get('phone'), dob: fd.get('dob'),
        bloodGroup: fd.get('bloodGroup'), address: fd.get('address'),
      });
      S.people = [...S.people, person].sort((a,b)=>a.name.localeCompare(b.name));
      showAddPerson = false;
      addPersonForm = { name:'', relationship:'Self', phone:'', dob:'', bloodGroup:'', address:'' };
      render();
    } catch(err) {
      alert(`Failed to add person: ${err.message}`);
      if (btn) { btn.disabled = false; btn.textContent = 'Add Person'; }
    }
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // LOAD PEOPLE  (called after unlock)
  // ─────────────────────────────────────────────────────────────────────────────
  async function loadPeople() {
    try {
      S.people = await getPeople();
      const docs = await getAllDocs();
      S.docCounts = {};
      docs.forEach(d => { S.docCounts[d.personId] = (S.docCounts[d.personId]??0) + 1; });
    } catch(e) { console.error(e); }
    finally { S.loadingPeople = false; render(); }
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // UPLOAD MODAL
  // ─────────────────────────────────────────────────────────────────────────────
  function openUpload(person) {
    uploadSt = { person, file:null, docName:'', folder:FOLDERS[0], remark:'',
                 dragOver:false, dupWarn:false, uploading:false, progress:0, fileSizeError:null };
    renderUploadModal();
  }
  function closeUpload() { uploadSt = null; renderUploadModal(); }

  function applyUploadFile(f) {
    if (!uploadSt) return;
    if (f.size > MAX_FILE_SIZE) {
      uploadSt.fileSizeError = `File too large (${(f.size/1048576).toFixed(1)} MB). Max is 50 MB.`;
      renderUploadModal(); return;
    }
    uploadSt.fileSizeError = null;
    uploadSt.file = f;
    if (!uploadSt.docName) uploadSt.docName = f.name;
    renderUploadModal();
  }

  function attachUploadEvents() {
    on('up-close',      'click', closeUpload);
    on('up-cancel',     'click', closeUpload);
    on('up-overlay',    'click', e => { if (e.target.id==='up-overlay') closeUpload(); });
    on('up-browse',     'click', () => document.getElementById('up-file')?.click());
    on('up-camera',     'click', () => document.getElementById('up-cam')?.click());
    on('up-cancel-dup', 'click', () => { uploadSt.dupWarn=false; renderUploadModal(); });

    on('up-file', 'change', e => { const f=e.target.files[0]; if(f) applyUploadFile(f); });
    on('up-cam',  'change', e => { const f=e.target.files[0]; if(f) applyUploadFile(f); });

    // Drag-and-drop
    const drop = document.getElementById('up-drop');
    if (drop) {
      drop.addEventListener('click',     () => document.getElementById('up-file')?.click());
      drop.addEventListener('dragover',  e => { e.preventDefault(); uploadSt.dragOver=true;  updateDropZone(); });
      drop.addEventListener('dragleave', () => { uploadSt.dragOver=false; updateDropZone(); });
      drop.addEventListener('drop',      e => {
        e.preventDefault(); uploadSt.dragOver=false;
        const f = e.dataTransfer.files[0]; if (f) applyUploadFile(f); else updateDropZone();
      });
    }

    // Live input sync (no re-render to avoid focus loss)
    on('up-name',   'input', e => { if(uploadSt) uploadSt.docName = e.target.value; });
    on('up-folder', 'change',e => { if(uploadSt) uploadSt.folder  = e.target.value; });
    on('up-remark', 'input', e => { if(uploadSt) uploadSt.remark  = e.target.value; });

    on('up-form', 'submit', handleUploadSubmit);
  }

  function updateDropZone() {
    const drop = document.getElementById('up-drop');
    if (!drop || !uploadSt) return;
    drop.style.border = `2px dashed ${uploadSt.dragOver?'var(--primary)':'var(--border)'}`;
    drop.style.background = uploadSt.dragOver?'var(--primary-dim)':'var(--surface-2)';
  }

  async function handleUploadSubmit(e) {
    e.preventDefault();
    if (!uploadSt?.file) return;
    // Sync inputs before processing
    uploadSt.docName = document.getElementById('up-name')?.value || uploadSt.file.name;
    uploadSt.folder  = document.getElementById('up-folder')?.value || FOLDERS[0];
    uploadSt.remark  = document.getElementById('up-remark')?.value || '';

    const isDup = await checkDuplicate(uploadSt.person.id, uploadSt.file.name, uploadSt.file.size);
    if (isDup && !uploadSt.dupWarn) { uploadSt.dupWarn = true; renderUploadModal(); return; }
    uploadSt.dupWarn = false;
    await startUpload();
  }

  async function startUpload() {
    if (!uploadSt) return;
    uploadSt.uploading = true; uploadSt.progress = 0;
    renderUploadModal();

    let stopped = false;
    const iv = setInterval(() => {
      if (stopped) return;
      uploadSt.progress = Math.min(uploadSt.progress + Math.random()*12, 95);
      const bar = document.getElementById('up-bar');
      if (bar) bar.style.width = `${uploadSt.progress}%`;
      const btn = document.getElementById('up-submit');
      if (btn) btn.textContent = `Uploading… ${Math.round(uploadSt.progress)}%`;
    }, 80);

    try {
      await saveDocument(uploadSt.file, uploadSt.docName.trim()||uploadSt.file.name,
                         uploadSt.folder, uploadSt.person.id, uploadSt.remark.trim());
      stopped = true; clearInterval(iv);
      uploadSt.progress = 100;
      const bar = document.getElementById('up-bar');
      if (bar) bar.style.width = '100%';
      await new Promise(r => setTimeout(r, 300));

      // Refresh person view
      const pid = uploadSt.person.id;
      S.docCounts[pid] = (S.docCounts[pid]??0) + 1;
      closeUpload();
      if (S.view === 'person' && S.person?.id === pid) {
        pvDocs = await getDocsByPerson(pid);
        pvOpenFolders = new Set(pvDocs.map(d=>d.folderName));
        const area = document.getElementById('pv-docs');
        if (area) { area.innerHTML = renderPersonDocs(); attachDocCardEvents(); lazyThumbs(pvDocs); }
      }
    } catch(err) {
      stopped = true; clearInterval(iv);
      uploadSt.uploading = false; uploadSt.progress = 0;
      renderUploadModal();
      alert(`Upload failed: ${err.message}`);
    }
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // DOCUMENT VIEWER MODAL
  // ─────────────────────────────────────────────────────────────────────────────
  function openViewer(doc) {
    // Revoke any old object URLs
    closeViewer(false);
    viewerSt = {
      doc, blob:null, blobUrl:null, pdfPageUrls:[],
      loadingFile:true, remark:doc.remark??'',
      editing:false, nameInput:doc.name,
      ocrLoading:false, ocrProgress:null,
      showDownload:false, confirmDelete:false, deleting:false,
      downloadSt: { format:'JPG', preset:'original', previewUrl:null, processing:false },
    };
    document.body.style.overflow = 'hidden';
    renderViewerModal();
    loadViewerFile(doc);
  }

  function closeViewer(restore = true) {
    if (viewerSt) {
      if (viewerSt.blobUrl)  URL.revokeObjectURL(viewerSt.blobUrl);
      if (viewerSt.downloadSt?.previewUrl) URL.revokeObjectURL(viewerSt.downloadSt.previewUrl);
      viewerSt.pdfPageUrls.forEach(u => URL.revokeObjectURL(u));
    }
    viewerSt = null;
    if (restore) document.body.style.overflow = '';
    document.getElementById('modal-root').innerHTML = '';
  }

  async function loadViewerFile(doc) {
    if (!viewerSt) return;
    try {
      const blob = await getDocFile(doc.id);
      if (!viewerSt) return; // modal closed while loading
      if (!blob) { viewerSt.loadingFile = false; renderViewerModal(); return; }
      viewerSt.blob = blob;

      if (doc.fileType === 'application/pdf') {
        viewerSt.loadingFile = false;
        renderViewerModal();
        const pages = await pdfToImages(blob);
        if (!viewerSt) { pages.forEach(p => {}); return; }
        viewerSt.pdfPageUrls = pages.map(p => URL.createObjectURL(p));
        renderViewerModal();
      } else {
        viewerSt.blobUrl = URL.createObjectURL(blob);
        viewerSt.loadingFile = false;
        // Build download preview URL
        viewerSt.downloadSt.previewUrl = URL.createObjectURL(blob);
        renderViewerModal();
      }
    } catch(e) {
      console.error(e);
      if (viewerSt) { viewerSt.loadingFile = false; renderViewerModal(); }
    }
  }

  function attachViewerEvents() {
    on('vw-close', 'click', () => closeViewer());
    on('vw-overlay','click', e => { if(e.target.id==='vw-overlay') closeViewer(); });

    // Rename
    on('vw-name', 'click', () => {
      if (!viewerSt) return;
      viewerSt.editing = true;
      renderViewerModal();
      document.getElementById('vw-name-input')?.focus();
    });
    on('vw-name-input', 'blur',    handleRename);
    on('vw-name-input', 'keydown', e => { if(e.key==='Enter') handleRename(); });

    // Remark
    on('vw-remark', 'input', e => { if(viewerSt) viewerSt.remark = e.target.value; });
    on('vw-save-remark', 'click', async () => {
      if (!viewerSt) return;
      const remark = document.getElementById('vw-remark')?.value ?? viewerSt.remark;
      const updated = await updateRemark(viewerSt.doc.id, remark);
      viewerSt.doc = updated; viewerSt.remark = remark;
    });

    // OCR
    on('vw-ocr', 'click', handleOcr);

    // Delete
    on('vw-del',        'click', () => { if(viewerSt){ viewerSt.confirmDelete=true; renderViewerModal(); } });
    on('vw-cancel-del', 'click', () => { if(viewerSt){ viewerSt.confirmDelete=false; renderViewerModal(); } });
    on('vw-confirm-del','click', handleDelete);

    // Download
    on('vw-dl-btn', 'click', () => {
      if (!viewerSt) return;
      viewerSt.showDownload = true;
      renderViewerModal();
    });

    // Nested download modal events
    on('dl-close',   'click', () => { if(viewerSt){ viewerSt.showDownload=false; renderViewerModal(); } });
    on('dl-overlay', 'click', e => { if(e.target.id==='dl-overlay' && viewerSt){ viewerSt.showDownload=false; renderViewerModal(); } });
    on('dl-go',      'click', handleDownload);
    ['JPG','PNG','PDF'].forEach(f => {
      on(`dl-fmt-${f}`, 'click', () => { if(viewerSt){ viewerSt.downloadSt.format=f; renderViewerModal(); } });
    });
    ['original','passport','stamp','a4'].forEach(p => {
      on(`dl-pre-${p}`, 'click', () => { if(viewerSt){ viewerSt.downloadSt.preset=p; renderViewerModal(); } });
    });
  }

  async function handleRename() {
    if (!viewerSt) return;
    const trimmed = document.getElementById('vw-name-input')?.value.trim();
    if (!trimmed || trimmed === viewerSt.doc.name) { viewerSt.editing=false; renderViewerModal(); return; }
    const updated = await renameDoc(viewerSt.doc.id, trimmed);
    viewerSt.doc = updated; viewerSt.nameInput = trimmed; viewerSt.editing = false;
    // Update pvDocs if in person view
    const idx = pvDocs.findIndex(d=>d.id===updated.id);
    if (idx!==-1) pvDocs[idx] = updated;
    renderViewerModal();
  }

  async function handleOcr() {
    if (!viewerSt || !viewerSt.blobUrl) return;
    viewerSt.ocrLoading = true; viewerSt.ocrProgress = 0;
    renderViewerModal();
    try {
      const { createWorker } = await import('https://unpkg.com/tesseract.js@5.0.4/dist/tesseract.esm.min.js');
      const worker = await createWorker('eng', 1, {
        logger: m => {
          if (m.status === 'recognizing text' && viewerSt) {
            viewerSt.ocrProgress = Math.round(m.progress * 100);
            const btn = document.getElementById('vw-ocr');
            if (btn) btn.textContent = `${t('extracting', S.lang)} ${viewerSt.ocrProgress}%`;
          }
        }
      });
      const { data: { text } } = await worker.recognize(viewerSt.blobUrl);
      await worker.terminate();
      if (viewerSt) {
        viewerSt.remark = (viewerSt.remark + '\n\n--- OCR Text ---\n' + text).trim();
        const ta = document.getElementById('vw-remark');
        if (ta) ta.value = viewerSt.remark;
      }
    } catch(err) { console.error('OCR failed:', err); }
    finally {
      if (viewerSt) {
        viewerSt.ocrLoading = false;
        const btn = document.getElementById('vw-ocr');
        if (btn) { btn.disabled=false; btn.textContent='🔍 Extract Text (OCR)'; }
      }
    }
  }

  async function handleDelete() {
    if (!viewerSt) return;
    viewerSt.deleting = true; renderViewerModal();
    try {
      await deleteDoc(viewerSt.doc.id);
      const docId = viewerSt.doc.id;
      const pid = viewerSt.doc.personId;
      pvDocs = pvDocs.filter(d=>d.id!==docId);
      if (S.docCounts[pid]) S.docCounts[pid] = Math.max(0, S.docCounts[pid]-1);
      closeViewer();
      // Refresh docs area
      const area = document.getElementById('pv-docs');
      if (area) { area.innerHTML = renderPersonDocs(); attachDocCardEvents(); }
    } catch(e) {
      viewerSt.deleting = false; renderViewerModal();
      alert(`Delete failed: ${e.message}`);
    }
  }

  async function handleDownload() {
    if (!viewerSt?.blob) return;
    const ds = viewerSt.downloadSt;
    ds.processing = true; renderViewerModal();
    try {
      let out;
      const MIME = { JPG:'image/jpeg', PNG:'image/png' };
      if (ds.format === 'PDF') {
        out = viewerSt.blob.type === 'application/pdf' ? viewerSt.blob : await blobToPdfBlob(viewerSt.blob);
      } else {
        const isImg = viewerSt.blob.type.startsWith('image/');
        out = isImg ? await resizeImageForExport(viewerSt.blob, MIME[ds.format], ds.preset) : viewerSt.blob;
      }
      const ext = { JPG:'jpg', PNG:'png', PDF:'pdf' }[ds.format];
      dlFile(out, `${(viewerSt.doc.name||'document').replace(/\.[^.]+$/,'')}.${ext}`);
    } catch(e) { alert(`Download failed: ${e.message}`); }
    finally { if(viewerSt){ ds.processing=false; renderViewerModal(); } }
  }

  // ─────────────────────────────────────────────────────────────────────────────
  // INIT
  // ─────────────────────────────────────────────────────────────────────────────
  setTheme(S.theme);
  render();
  if (S.isUnlocked) loadPeople();

  </script>
</body>
</html>
